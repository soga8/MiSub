name: 每小时自动同步上游 (Sync Fork with Upstream)

on:
  schedule:
    - cron: '0 */1 * * *'      # 推荐改成每 3 小时一次（够用且更省资源）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 自动同步上游仓库
        uses: tgymnich/fork-sync@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main           # 原作者的上游分支
          head: main           # 你的分支
