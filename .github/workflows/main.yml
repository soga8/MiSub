name: 每小时自动同步上游 (Sync Fork with Upstream)

on:
  schedule:
    - cron: '0 * * * *'      # 每小时整点运行一次（UTC 时间，北京时间约早上 8 点）
  workflow_dispatch:         # 允许你手动点击运行测试

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 自动同步上游仓库
        uses: tgymnich/fork-sync@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # owner 和 repo 可以不写，action 会自动使用当前仓库
          base: main           # 上游（原作者 imzyb/MiSub）的分支
          head: main           # 你的分支（要更新到的分支）
          merge_method: merge  # 可选：merge / rebase / squash
